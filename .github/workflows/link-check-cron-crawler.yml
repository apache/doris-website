name: link-check-cron-crawler

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cron-crawler:
    runs-on: ubuntu-latest
    steps:
      - name: Run Crawler Link Checker
        run: |
          npx -y linkinator https://doris.apache.org --recurse --check-images --skip "^(?!https?://(www\.)?doris\.apache\.org)" --format json > link_results.json || echo "HAS_BROKEN=true"

      - name: Send Feishu Notification on failure
        if: always()
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          node .github/workflows/scripts/feishu-reporter.js
