name: Docs AI Review

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to run docs AI review for
        required: true
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  docs-ai-review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '/review-docs') &&
        (
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      )

    steps:
      - name: Get PR info
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            PR_NUMBER="$DISPATCH_PR_NUMBER"
          else
            PR_NUMBER=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")
          fi

          PR_JSON=$(gh api repos/${{ github.repository }}/pulls/${PR_NUMBER})
          HEAD_SHA=$(echo "$PR_JSON" | jq -r '.head.sha')
          BASE_SHA=$(echo "$PR_JSON" | jq -r '.base.sha')

          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "base_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_sha }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Prepare docs AI review packet
        env:
          BASE_SHA: ${{ steps.pr.outputs.base_sha }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        run: |
          mkdir -p website-quality-governance/generated
          changed_files=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | paste -sd, -)

          yarn docs:ai-review:prepare \
            --files "$changed_files" \
            --base "$BASE_SHA" \
            --output website-quality-governance/generated/ai-review-packet.json

          jq '{schema_version, changed_files, high_risk, review_agents: [.review_agents[].id], sync_groups: [.sync_groups[].sync_group_id]}' \
            website-quality-governance/generated/ai-review-packet.json

      - name: Upsert advisory PR comment
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          BASE_SHA: ${{ steps.pr.outputs.base_sha }}
        run: |
          packet=website-quality-governance/generated/ai-review-packet.json

          marker='<!-- docs-ai-review:packet -->'
          changed_count=$(jq '.changed_files | length' "$packet")
          high_risk=$(jq -r '.high_risk.required' "$packet")
          agent_count=$(jq '.review_agents | length' "$packet")

          cat > /tmp/docs-ai-review-comment.md <<EOF
          $marker
          Docs AI review packet prepared for this PR.

          - Trigger: \`/review-docs\`
          - Changed files in packet: \`$changed_count\`
          - High-risk docs path matched: \`$high_risk\`
          - Review agents included: \`$agent_count\`
          - Base SHA: \`$BASE_SHA\`
          - Head SHA: \`$HEAD_SHA\`

          This MVP prepares the packet for advisory AI review. AI findings, when produced, are suggestions only; deterministic governance CI remains the blocking signal.
          EOF

          existing_comment_id=$(
            gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              --paginate \
              --jq ".[] | select(.user.type == \"Bot\" and (.body | contains(\"$marker\"))) | .id" \
              | tail -n 1
          )

          if [ -n "$existing_comment_id" ]; then
            gh api \
              --method PATCH \
              "repos/${{ github.repository }}/issues/comments/${existing_comment_id}" \
              -f body="$(cat /tmp/docs-ai-review-comment.md)"
          else
            gh api \
              --method POST \
              "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              -f body="$(cat /tmp/docs-ai-review-comment.md)"
          fi
