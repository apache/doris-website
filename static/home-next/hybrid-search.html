<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apache Doris — Hybrid Search</title>
<style>
  /* ── Reset & Base ───────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-dark:    #1c2214;
    --bg-stripe:  #202818;
    --card-bg:    rgba(22, 30, 16, 0.92);
    --card-border:rgba(190, 202, 116, 0.22);
    --yellow:     #ffd84a;
    --yellow-dim: rgba(255, 216, 74, 0.18);
    --yellow-glow:rgba(255, 216, 74, 0.62);
    --green-node: #7ab648;
    --green-dim:  rgba(122, 182, 72, 0.25);
    --text-dim:   rgba(247, 240, 222, 0.8);
    --mono: Inter, system-ui, -apple-system, "Segoe UI", sans-serif;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
  }

  body {
    background: transparent;
    font-family: var(--mono);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── Background card shell ─────────────────────────────────── */
  .canvas {
    position: relative;
    width: min(720px, 92vmin);
    aspect-ratio: 1 / 1;
    border-radius: 26px;
    overflow: hidden;
    background: linear-gradient(180deg, rgba(18, 24, 14, 0.98) 0%, rgba(15, 20, 12, 0.98) 100%);
    border: 1px solid rgba(255, 216, 74, 0.08);
    box-shadow: 0 28px 64px rgba(0, 0, 0, 0.24);
  }

  /* ── Scale stage ────────────────────────────────────────────── */
  .stage {
    position: absolute;
    left: 50%;
    top: 50%;
    z-index: 1;
    /* JS sets transform; transform-origin keeps it centered */
    transform-origin: center center;
  }

  /* ── Fixed-size canvas ──────────────────────────────────────── */
  .scene {
    position: relative;
    width: 680px;
    height: 520px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
    background: transparent;
  }

  /* ── Pyramid layout ─────────────────────────────────────────── */
  .pyramid {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  .row-top {
    display: flex;
    justify-content: center;
  }
  .row-bottom {
    display: flex;
    justify-content: center;
    gap: 20px;
  }

  /* ── Card base ──────────────────────────────────────────────── */
  .card {
    width: 280px;
    height: 200px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    backdrop-filter: blur(8px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 18px;
    position: relative;
    overflow: hidden;
  }
  .card-sm {
    width: 210px;
    height: 180px;
  }
  .card::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 14px;
    background: linear-gradient(135deg, rgba(232,194,42,0.04) 0%, transparent 60%);
    pointer-events: none;
  }
  .card-label {
    position: absolute;
    bottom: 12px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.45);
  }
  .card-title {
    position: absolute;
    top: 12px;
    left: 14px;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--yellow);
    opacity: 1;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
  }

  /* ══════════════════════════════════════════════════════════════
     CARD 1 — RAG Semantic Retrieval (radial network)
  ══════════════════════════════════════════════════════════════ */
  .rag-canvas {
    position: relative;
    width: 150px;
    height: 140px;
    margin-top: 8px;
  }
  .rag-canvas svg {
    width: 100%;
    height: 100%;
    animation: ragRotate 18s linear infinite;
    transform-origin: center center;
  }
  @keyframes ragRotate {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  /* pulse on center node */
  .node-center-pulse {
    animation: nodePulse 2.4s ease-in-out infinite;
  }
  @keyframes nodePulse {
    0%, 100% { r: 9; opacity: 1; }
    50%       { r: 11; opacity: 0.7; }
  }
  /* satellite nodes twinkle */
  .node-sat {
    animation: nodeTwinkle var(--dur, 2s) ease-in-out infinite;
    animation-delay: var(--delay, 0s);
  }
  @keyframes nodeTwinkle {
    0%, 100% { opacity: 0.9; }
    50%       { opacity: 0.35; }
  }
  /* edge pulse */
  .edge-line {
    animation: edgeFade var(--dur, 3s) ease-in-out infinite;
    animation-delay: var(--delay, 0s);
  }
  @keyframes edgeFade {
    0%, 100% { opacity: 0.5; }
    50%       { opacity: 0.12; }
  }

  /* ══════════════════════════════════════════════════════════════
     CARD 2 — Agent Observability (two agents + dot on line)
  ══════════════════════════════════════════════════════════════ */
  .agent-scene {
    display: flex;
    align-items: center;
    gap: 0;
    width: 160px;
    position: relative;
    margin-top: 8px;
  }
  .agent-box {
    width: 44px;
    height: 44px;
    border-radius: 8px;
    border: 1.5px solid rgba(232,194,42,0.45);
    background: rgba(232,194,42,0.07);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    letter-spacing: 0.08em;
    color: var(--yellow);
    text-transform: uppercase;
    flex-shrink: 0;
    position: relative;
    z-index: 2;
  }
  .agent-box.pulse-box {
    animation: agentGlow 2s ease-in-out infinite alternate;
  }
  @keyframes agentGlow {
    from { box-shadow: 0 0 0px rgba(232,194,42,0); }
    to   { box-shadow: 0 0 12px rgba(232,194,42,0.35); }
  }
  .agent-connector {
    flex: 1;
    height: 1.5px;
    background: linear-gradient(90deg, rgba(232,194,42,0.3), rgba(232,194,42,0.15), rgba(232,194,42,0.3));
    position: relative;
    overflow: visible;
  }
  .agent-dot {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--yellow);
    box-shadow: 0 0 8px 3px var(--yellow-glow);
    animation: dotTravel 2.2s ease-in-out infinite;
  }
  @keyframes dotTravel {
    0%   { left: -3px; opacity: 0; }
    8%   { opacity: 1; }
    92%  { opacity: 1; }
    100% { left: calc(100% - 4px); opacity: 0; }
  }
  .agent-labels {
    display: flex;
    justify-content: space-between;
    width: 160px;
    margin-top: 8px;
  }
  .agent-lbl {
    font-size: 9px;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    text-transform: uppercase;
    width: 44px;
    text-align: center;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.45);
  }
  .obs-tag {
    margin-top: 6px;
    font-size: 9px;
    letter-spacing: 0.12em;
    color: rgba(213, 255, 169, 0.92);
    text-transform: uppercase;
    border: 1px solid rgba(213, 255, 169, 0.3);
    padding: 3px 9px;
    border-radius: 4px;
    animation: tagBlink 3s ease-in-out infinite;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.45);
  }
  @keyframes tagBlink {
    0%, 80%, 100% { opacity: 0.7; }
    90%            { opacity: 0.2; }
  }

  /* ══════════════════════════════════════════════════════════════
     CARD 3 — Multimodal Data Processing
  ══════════════════════════════════════════════════════════════ */
  .mm-scene {
    display: flex;
    gap: 14px;
    align-items: center;
    margin-top: 8px;
  }
  .mm-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .mm-icon {
    width: 38px;
    height: 38px;
    border-radius: 8px;
    border: 1.5px solid rgba(232,194,42,0.3);
    background: rgba(232,194,42,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .mm-lbl {
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    text-transform: uppercase;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.45);
  }
  /* staggered fade cycle */
  .mm-item:nth-child(1) { animation: mmFade 3.6s ease-in-out infinite 0s; }
  .mm-item:nth-child(2) { animation: mmFade 3.6s ease-in-out infinite 1.2s; }
  .mm-item:nth-child(3) { animation: mmFade 3.6s ease-in-out infinite 2.4s; }
  @keyframes mmFade {
    0%   { opacity: 0.3; transform: translateY(2px); }
    18%  { opacity: 1;   transform: translateY(0); }
    64%  { opacity: 1;   transform: translateY(0); }
    82%  { opacity: 0.3; transform: translateY(2px); }
    100% { opacity: 0.3; transform: translateY(2px); }
  }
  .mm-divider {
    width: 1px;
    height: 32px;
    background: linear-gradient(180deg, transparent, rgba(232,194,42,0.2), transparent);
  }

  /* ── Footer tag ─────────────────────────────────────────────── */
  .footer-tag {
    position: relative;
    z-index: 1;
    text-align: center;
    margin-top: 28px;
  }
  .footer-tag span {
    display: inline-block;
    border: 1px solid rgba(255,216,74,0.34);
    color: var(--yellow);
    font-size: 12px;
    font-family: var(--mono);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 7px 18px;
    border-radius: 6px;
    background: rgba(255,216,74,0.08);
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
  }

  /* ── Connector lines between top card and bottom cards ──────── */
  .pyramid-connector {
    position: relative;
    z-index: 1;
    width: 680px;
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="canvas">
<div class="stage" id="stage">
<div class="scene">

  <!-- Pyramid -->
  <div class="pyramid">

    <!-- TOP CARD — RAG Semantic Retrieval -->
    <div class="row-top">
      <div class="card">
        <div class="card-title">RAG · Semantic Retrieval</div>

        <div class="rag-canvas">
          <svg viewBox="0 0 150 140" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Outer orbit ring -->
            <circle cx="75" cy="70" r="52" stroke="rgba(232,194,42,0.08)" stroke-width="1" stroke-dasharray="4 6"/>

            <!-- Edges from center to satellites -->
            <line x1="75" y1="70" x2="75"  y2="18"  stroke="rgba(232,194,42,0.35)" stroke-width="1" class="edge-line" style="--dur:3.1s;--delay:0s"/>
            <line x1="75" y1="70" x2="123" y2="44"  stroke="rgba(122,182,72,0.35)"  stroke-width="1" class="edge-line" style="--dur:2.7s;--delay:0.4s"/>
            <line x1="75" y1="70" x2="127" y2="96"  stroke="rgba(232,194,42,0.35)" stroke-width="1" class="edge-line" style="--dur:3.5s;--delay:0.8s"/>
            <line x1="75" y1="70" x2="75"  y2="122" stroke="rgba(122,182,72,0.35)"  stroke-width="1" class="edge-line" style="--dur:2.9s;--delay:0.2s"/>
            <line x1="75" y1="70" x2="23"  y2="96"  stroke="rgba(232,194,42,0.35)" stroke-width="1" class="edge-line" style="--dur:3.3s;--delay:0.6s"/>
            <line x1="75" y1="70" x2="27"  y2="44"  stroke="rgba(122,182,72,0.35)"  stroke-width="1" class="edge-line" style="--dur:2.8s;--delay:1.0s"/>

            <!-- Cross-edges (secondary connections) -->
            <line x1="75"  y1="18"  x2="123" y2="44"  stroke="rgba(232,194,42,0.15)" stroke-width="0.7" class="edge-line" style="--dur:4s;--delay:0.5s"/>
            <line x1="123" y1="44"  x2="127" y2="96"  stroke="rgba(122,182,72,0.15)"  stroke-width="0.7" class="edge-line" style="--dur:3.8s;--delay:1.2s"/>
            <line x1="127" y1="96"  x2="75"  y2="122" stroke="rgba(232,194,42,0.15)" stroke-width="0.7" class="edge-line" style="--dur:4.2s;--delay:0.3s"/>
            <line x1="75"  y1="122" x2="23"  y2="96"  stroke="rgba(122,182,72,0.15)"  stroke-width="0.7" class="edge-line" style="--dur:3.6s;--delay:0.9s"/>
            <line x1="23"  y1="96"  x2="27"  y2="44"  stroke="rgba(232,194,42,0.15)" stroke-width="0.7" class="edge-line" style="--dur:4.4s;--delay:0.7s"/>
            <line x1="27"  y1="44"  x2="75"  y2="18"  stroke="rgba(122,182,72,0.15)"  stroke-width="0.7" class="edge-line" style="--dur:3.9s;--delay:1.4s"/>

            <!-- Satellite nodes -->
            <circle cx="75"  cy="18"  r="5" fill="#e8c22a" opacity="0.85" class="node-sat" style="--dur:2.1s;--delay:0s"/>
            <circle cx="123" cy="44"  r="4" fill="#7ab648" opacity="0.8"  class="node-sat" style="--dur:2.9s;--delay:0.3s"/>
            <circle cx="127" cy="96"  r="5" fill="#e8c22a" opacity="0.85" class="node-sat" style="--dur:2.4s;--delay:0.7s"/>
            <circle cx="75"  cy="122" r="4" fill="#7ab648" opacity="0.8"  class="node-sat" style="--dur:3.1s;--delay:0.5s"/>
            <circle cx="23"  cy="96"  r="5" fill="#e8c22a" opacity="0.85" class="node-sat" style="--dur:2.6s;--delay:1.0s"/>
            <circle cx="27"  cy="44"  r="4" fill="#7ab648" opacity="0.8"  class="node-sat" style="--dur:2.3s;--delay:0.2s"/>

            <!-- Center glow -->
            <circle cx="75" cy="70" r="16" fill="rgba(232,194,42,0.06)"/>
            <circle cx="75" cy="70" r="12" fill="rgba(232,194,42,0.1)"/>
            <!-- Center node -->
            <circle cx="75" cy="70" r="9" fill="#e8c22a" class="node-center-pulse"/>
            <circle cx="75" cy="70" r="4" fill="rgba(28,34,20,0.95)"/>
          </svg>
        </div>

        <div class="card-label">Vector · Full-text · BM25 fusion</div>
      </div>
    </div>

    <!-- Pyramid SVG connector -->
    <svg class="pyramid-connector" height="28" viewBox="0 0 680 28" xmlns="http://www.w3.org/2000/svg" style="margin:-6px 0;">
      <line x1="340" y1="0" x2="230" y2="28" stroke="rgba(232,194,42,0.15)" stroke-width="1" stroke-dasharray="3 5"/>
      <line x1="340" y1="0" x2="450" y2="28" stroke="rgba(232,194,42,0.15)" stroke-width="1" stroke-dasharray="3 5"/>
    </svg>

    <!-- BOTTOM ROW -->
    <div class="row-bottom">

      <!-- CARD 2 — Agent Observability -->
      <div class="card card-sm">
        <div class="card-title">Agent Observability</div>

        <div class="agent-scene">
          <div class="agent-box pulse-box">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <rect x="3" y="6" width="14" height="10" rx="2" stroke="#e8c22a" stroke-width="1.2" fill="none"/>
              <rect x="7" y="3" width="6" height="4" rx="1" stroke="#e8c22a" stroke-width="1.2" fill="none"/>
              <circle cx="10" cy="11" r="2" fill="#e8c22a" opacity="0.7"/>
            </svg>
          </div>
          <div class="agent-connector">
            <div class="agent-dot"></div>
          </div>
          <div class="agent-box" style="animation: agentGlow 2s ease-in-out infinite alternate; animation-delay: 1.1s;">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <rect x="3" y="6" width="14" height="10" rx="2" stroke="#7ab648" stroke-width="1.2" fill="none"/>
              <rect x="7" y="3" width="6" height="4" rx="1" stroke="#7ab648" stroke-width="1.2" fill="none"/>
              <circle cx="10" cy="11" r="2" fill="#7ab648" opacity="0.7"/>
            </svg>
          </div>
        </div>

        <div class="agent-labels">
          <div class="agent-lbl">Agent A</div>
          <div class="agent-lbl" style="color:rgba(122,182,72,0.55)">Agent B</div>
        </div>

        <div class="obs-tag">trace · span · log</div>
        <div class="card-label">Distributed tracing</div>
      </div>

      <!-- CARD 3 — Multimodal Data Processing -->
      <div class="card card-sm">
        <div class="card-title">Multimodal Processing</div>

        <div class="mm-scene">
          <!-- TEXT -->
          <div class="mm-item">
            <div class="mm-icon">
              <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                <rect x="3" y="4" width="16" height="2" rx="1" fill="#e8c22a" opacity="0.8"/>
                <rect x="3" y="8" width="12" height="2" rx="1" fill="#e8c22a" opacity="0.6"/>
                <rect x="3" y="12" width="14" height="2" rx="1" fill="#e8c22a" opacity="0.5"/>
                <rect x="3" y="16" width="9"  height="2" rx="1" fill="#e8c22a" opacity="0.4"/>
              </svg>
            </div>
            <div class="mm-lbl">Text</div>
          </div>

          <div class="mm-divider"></div>

          <!-- AUDIO -->
          <div class="mm-item">
            <div class="mm-icon">
              <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                <rect x="4"  y="8"  width="2" height="6"  rx="1" fill="#7ab648" opacity="0.7"/>
                <rect x="7"  y="5"  width="2" height="12" rx="1" fill="#7ab648" opacity="0.9"/>
                <rect x="10" y="7"  width="2" height="8"  rx="1" fill="#7ab648" opacity="0.8"/>
                <rect x="13" y="4"  width="2" height="14" rx="1" fill="#7ab648" opacity="0.6"/>
                <rect x="16" y="9"  width="2" height="4"  rx="1" fill="#7ab648" opacity="0.5"/>
              </svg>
            </div>
            <div class="mm-lbl">Audio</div>
          </div>

          <div class="mm-divider"></div>

          <!-- VIDEO -->
          <div class="mm-item">
            <div class="mm-icon">
              <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                <rect x="2" y="6" width="12" height="10" rx="2" stroke="#e8c22a" stroke-width="1.2" fill="none" opacity="0.8"/>
                <path d="M14 9.5 L19 7 L19 15 L14 12.5 Z" stroke="#e8c22a" stroke-width="1.2" fill="none" opacity="0.6"/>
              </svg>
            </div>
            <div class="mm-lbl">Video</div>
          </div>
        </div>

        <div class="card-label">Embedding · Index · Query</div>
      </div>

    </div><!-- row-bottom -->
  </div><!-- pyramid -->

  <!-- Footer -->
  <div class="footer-tag">
    <span>MATCH + COSINE_SIMILARITY + VECTOR_SEARCH</span>
  </div>

</div><!-- scene -->
</div><!-- stage -->
</div><!-- canvas -->

<script>
  (function () {
    var DESIGN_W = 680;
    var DESIGN_H = 520;
    var canvas = document.querySelector('.canvas');
    var stage = document.getElementById('stage');
    var resizeRaf = 0;

    function rescale() {
      resizeRaf = 0;
      var cw = canvas.clientWidth;
      var ch = canvas.clientHeight;
      var scale = Math.min(cw / DESIGN_W, ch / DESIGN_H) * 1.2;
      stage.style.transform = 'translate(-50%, -50%) scale(' + scale + ')';
    }

    function scheduleRescale() {
      if (resizeRaf) return;
      resizeRaf = requestAnimationFrame(rescale);
    }

    rescale();
    window.addEventListener('resize', scheduleRescale);

    if (typeof ResizeObserver !== 'undefined') {
      new ResizeObserver(scheduleRescale).observe(document.documentElement);
    }
  })();
</script>

</body>
</html>
